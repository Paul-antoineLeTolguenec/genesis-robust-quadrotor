name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev
        # uv sync installs the project in editable mode automatically (no separate pip install -e .)

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Run tests
        run: |
          set +e
          uv run pytest --cov=src/genesis_robust_rl --cov-report=xml
          EXIT=$?
          set -e
          [ $EXIT -eq 5 ] && echo "WARNING: no tests collected (exit 5 — all filtered by addopts)" || exit $EXIT

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
